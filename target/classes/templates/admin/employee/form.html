<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>员工表单</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/employee/list}">返回员工列表</a></div></nav>
<main class="container py-4">
    <h1 class="h3 mb-3" th:text="${employee != null and employee.id != null} ? '修改员工' : '新增员工'">员工表单</h1>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body" th:object="${employee}" th:action="${employee != null and employee.id != null} ? @{/admin/employee/edit} : @{/admin/employee/add}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">工号</label><input class="form-control" th:field="*{employeeNo}" required></div>
            <div class="col-md-3"><label class="form-label">姓名</label><input class="form-control" th:field="*{name}" required></div>
            <div class="col-md-3"><label class="form-label">性别</label><select class="form-select" th:field="*{gender}"><option value="男">男</option><option value="女">女</option></select></div>
            <div class="col-md-3"><label class="form-label">状态</label><select class="form-select" th:field="*{status}"><option value="在职">在职</option><option value="已注销">已注销</option></select></div>
            <div class="col-md-4"><label class="form-label">部门</label><select class="form-select" th:field="*{departmentId}" required><option value="">请选择</option><option th:each="d:${departments}" th:value="${d.id}" th:text="${d.departmentName}"></option></select></div>
            <div class="col-md-4"><label class="form-label">岗位</label><select class="form-select" th:field="*{positionId}" required><option value="">请选择</option><option th:each="p:${positions}" th:value="${p.id}" th:text="${p.positionName}"></option></select></div>
            <div class="col-md-4"><label class="form-label">职务</label><select class="form-select" th:field="*{jobTitleId}" required><option value="">请选择</option><option th:each="j:${jobTitles}" th:value="${j.id}" th:text="${j.titleName}"></option></select></div>
            <div class="col-md-4"><label class="form-label">入职日期</label><input class="form-control" type="date" th:field="*{hireDate}" required></div>
            <div class="col-md-4"><label class="form-label">离职日期</label><input class="form-control" type="date" th:field="*{resignDate}"></div>
            <div class="col-md-4"><label class="form-label">电话</label><input class="form-control" th:field="*{phone}"></div>
            <div class="col-md-6"><label class="form-label">邮箱</label><input class="form-control" th:field="*{email}"></div>
            <div class="col-md-6"><label class="form-label">地址</label><input class="form-control" th:field="*{address}"></div>
            <div class="col-md-4"><label class="form-label">基本工资</label><input class="form-control" name="baseSalary" th:value="${salary == null ? 0 : salary.baseSalary}" type="number" step="0.01"></div>
            <div class="col-md-4"><label class="form-label">补贴</label><input class="form-control" name="allowance" th:value="${salary == null ? 0 : salary.allowance}" type="number" step="0.01"></div>
            <div class="col-md-4"><label class="form-label">薪资生效日期</label><input class="form-control" name="effectiveDate" th:value="${salary == null ? null : salary.effectiveDate}" type="date"></div>
        </div>
        <div class="mt-4"><button class="btn btn-success" type="submit">保存</button></div>
    </form>
</main></body></html>
