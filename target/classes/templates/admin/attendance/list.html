<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>出勤管理</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">返回</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">出勤管理</h1><div class="alert alert-success" th:if="${message}" th:text="${message}"></div><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body mb-3" th:object="${record}" th:action="@{/admin/attendance/save}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="row g-2">
            <div class="col-md-3"><label class="form-label">员工</label><select class="form-select" th:field="*{employeeId}" required><option value="">请选择</option><option th:each="e:${employees}" th:value="${e.id}" th:text="${e.employeeNo + ' - ' + e.name}"></option></select></div>
            <div class="col-md-2"><label class="form-label">日期</label><input class="form-control" type="date" th:field="*{attendanceDate}" required></div>
            <div class="col-md-3"><label class="form-label">上班时间</label><input class="form-control" type="datetime-local" th:field="*{checkInTime}"></div>
            <div class="col-md-3"><label class="form-label">下班时间</label><input class="form-control" type="datetime-local" th:field="*{checkOutTime}"></div>
            <div class="col-md-1 d-grid align-items-end"><button class="btn btn-success" type="submit">保存</button></div>
            <div class="col-12"><input class="form-control" th:field="*{remark}" placeholder="备注"></div>
        </div>
    </form>
    <div class="card mb-3"><div class="card-body"><form class="row g-2" method="get" th:action="@{/admin/attendance/list}"><div class="col-md-3"><input class="form-control" name="employeeNo" th:value="${employeeNo}" placeholder="工号"></div><div class="col-md-3"><input class="form-control" name="name" th:value="${name}" placeholder="姓名"></div><div class="col-md-2"><input class="form-control" type="date" name="startDate" th:value="${startDate}"></div><div class="col-md-2"><input class="form-control" type="date" name="endDate" th:value="${endDate}"></div><div class="col-md-2"><button class="btn btn-outline-primary w-100" type="submit">查询</button></div></form></div></div>
    <div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>员工</th><th>部门</th><th>日期</th><th>上班</th><th>下班</th><th>状态</th><th>备注</th><th>操作</th></tr></thead><tbody>
        <tr th:each="row:${records}"><td th:text="${row.employeeNo + ' ' + row.employeeName}"></td><td th:text="${row.departmentName}"></td><td th:text="${row.record.attendanceDate}"></td><td th:text="${row.record.checkInTime}"></td><td th:text="${row.record.checkOutTime}"></td><td><span class="badge text-bg-primary" th:text="${row.record.status}"></span></td><td th:text="${row.record.remark}"></td><td class="text-nowrap"><a class="btn btn-sm btn-primary" th:href="@{/admin/attendance/list(editId=${row.record.id})}">修改</a> <form class="d-inline" th:action="@{/admin/attendance/delete}" method="post"><input type="hidden" name="id" th:value="${row.record.id}"><button class="btn btn-sm btn-danger" type="submit">删除</button></form></td></tr>
        <tr th:if="${records == null or #lists.isEmpty(records)}"><td colspan="8" class="text-center text-secondary py-4">暂无数据</td></tr>
    </tbody></table></div></div>
</main></body></html>
