<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人信息</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/}">员工考勤信息管理系统</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/employee/home(employeeNo=${employeeNo})}">返回员工主页</a></div></nav>
<main class="container py-4">
    <h1 class="h3 mb-3">个人信息</h1>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="card" th:if="${employee != null}">
        <div class="card-body">
            <form th:action="@{/employee/profile}" method="post">
                <input type="hidden" name="employeeNo" th:value="${employee.employeeNo}">
                <div class="row g-3">
                    <div class="col-md-4"><label class="form-label">工号</label><input class="form-control" th:value="${employee.employeeNo}" readonly></div>
                    <div class="col-md-4"><label class="form-label">姓名</label><input class="form-control" th:value="${employee.name}" readonly></div>
                    <div class="col-md-4"><label class="form-label">状态</label><input class="form-control" th:value="${employee.status}" readonly></div>
                    <div class="col-md-4"><label class="form-label">部门</label><input class="form-control" th:value="${employee.departmentName}" readonly></div>
                    <div class="col-md-4"><label class="form-label">岗位</label><input class="form-control" th:value="${employee.positionName}" readonly></div>
                    <div class="col-md-4"><label class="form-label">职务</label><input class="form-control" th:value="${employee.titleName}" readonly></div>
                    <div class="col-md-4"><label class="form-label">基本工资</label><input class="form-control" th:value="${employee.baseSalary}" readonly></div>
                    <div class="col-md-4"><label class="form-label">电话</label><input class="form-control" name="phone" th:value="${employee.phone}"></div>
                    <div class="col-md-4"><label class="form-label">邮箱</label><input class="form-control" name="email" th:value="${employee.email}"></div>
                    <div class="col-12"><label class="form-label">地址</label><input class="form-control" name="address" th:value="${employee.address}"></div>
                </div>
                <button class="btn btn-primary mt-4" type="submit">保存可修改信息</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
