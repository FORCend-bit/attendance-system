<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>员工主页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container"><a class="navbar-brand fw-bold" th:href="@{/}">员工考勤信息管理系统</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/employee}">切换工号</a></div>
</nav>
<main class="container py-4">
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div th:if="${employee != null}">
        <h1 class="h3 mb-3">员工主页</h1>
        <div class="card mb-3">
            <div class="card-body">
                <h2 class="h5" th:text="${employee.name}">员工姓名</h2>
                <p class="mb-0 text-secondary">
                    <span th:text="${employee.employeeNo}">工号</span>
                    <span class="mx-2">|</span>
                    <span th:text="${employee.departmentName}">部门</span>
                    <span class="mx-2">|</span>
                    <span th:text="${employee.positionName}">岗位</span>
                    <span class="mx-2">|</span>
                    <span th:text="${employee.titleName}">职务</span>
                </p>
                <div class="row g-2 mt-3">
                    <div class="col-md-3"><span class="text-secondary">状态：</span><span th:text="${employee.status}"></span></div>
                    <div class="col-md-3"><span class="text-secondary">电话：</span><span th:text="${employee.phone ?: '未填写'}"></span></div>
                    <div class="col-md-3"><span class="text-secondary">邮箱：</span><span th:text="${employee.email ?: '未填写'}"></span></div>
                    <div class="col-md-3"><span class="text-secondary">入职：</span><span th:text="${employee.hireDate}"></span></div>
                </div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-sm-6 col-lg-4"><a class="card module-card text-decoration-none h-100" th:href="@{/employee/profile(employeeNo=${employee.employeeNo})}"><div class="card-body"><h2 class="h5">个人信息</h2><p class="text-secondary mb-0">查看并修改电话、邮箱、地址</p></div></a></div>
            <div class="col-sm-6 col-lg-4"><a class="card module-card text-decoration-none h-100" th:href="@{/employee/attendance(employeeNo=${employee.employeeNo})}"><div class="card-body"><h2 class="h5">出勤记录</h2><p class="text-secondary mb-0">查看自己的出勤明细</p></div></a></div>
            <div class="col-sm-6 col-lg-4"><a class="card module-card text-decoration-none h-100" th:href="@{/employee/leave(employeeNo=${employee.employeeNo})}"><div class="card-body"><h2 class="h5">请假记录</h2><p class="text-secondary mb-0">查看自己的请假信息</p></div></a></div>
            <div class="col-sm-6 col-lg-4"><a class="card module-card text-decoration-none h-100" th:href="@{/employee/overtime(employeeNo=${employee.employeeNo})}"><div class="card-body"><h2 class="h5">加班记录</h2><p class="text-secondary mb-0">查看自己的加班小时</p></div></a></div>
            <div class="col-sm-6 col-lg-4"><a class="card module-card text-decoration-none h-100" th:href="@{/employee/trip(employeeNo=${employee.employeeNo})}"><div class="card-body"><h2 class="h5">出差记录</h2><p class="text-secondary mb-0">查看自己的出差信息</p></div></a></div>
        </div>
    </div>
</main>
</body>
</html>
