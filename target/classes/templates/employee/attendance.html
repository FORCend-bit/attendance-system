<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>我的出勤记录</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/}">员工考勤信息管理系统</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/employee/home(employeeNo=${employeeNo})}">返回员工主页</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">我的出勤记录</h1><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div><div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>日期</th><th>上班打卡</th><th>下班打卡</th><th>状态</th><th>备注</th></tr></thead><tbody><tr th:each="r : ${records}"><td th:text="${r.attendanceDate}"></td><td th:text="${r.checkInTime}"></td><td th:text="${r.checkOutTime}"></td><td><span class="badge text-bg-primary" th:text="${r.status}"></span></td><td th:text="${r.remark}"></td></tr><tr th:if="${records == null or #lists.isEmpty(records)}"><td colspan="5" class="text-center text-secondary py-4">暂无数据</td></tr></tbody></table></div></div></main>
</body></html>
