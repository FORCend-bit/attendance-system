<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>我的请假记录</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/}">员工考勤信息管理系统</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/employee/home(employeeNo=${employeeNo})}">返回员工主页</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">我的请假记录</h1><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div><div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>类型</th><th>开始</th><th>结束</th><th>天数</th><th>原因</th><th>状态</th></tr></thead><tbody><tr th:each="r : ${records}"><td th:text="${r.leaveType}"></td><td th:text="${r.startTime}"></td><td th:text="${r.endTime}"></td><td th:text="${r.days}"></td><td th:text="${r.reason}"></td><td th:text="${r.status}"></td></tr><tr th:if="${records == null or #lists.isEmpty(records)}"><td colspan="6" class="text-center text-secondary py-4">暂无数据</td></tr></tbody></table></div></div></main>
</body></html>
