<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>员工端入口</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">员工考勤信息管理系统</a>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">管理员端</a>
    </div>
</nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h4 mb-3">员工端入口</h2>
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <form th:action="@{/employee/enter}" method="post">
                        <label class="form-label" for="employeeNo">员工工号</label>
                        <input class="form-control form-control-lg" id="employeeNo" name="employeeNo" placeholder="例如 E2026001" required>
                        <button class="btn btn-primary w-100 mt-4" type="submit">进入我的考勤页面</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
