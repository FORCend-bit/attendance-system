<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>月度统计</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">返回</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">月度部门考勤统计</h1><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body mb-3" method="get" th:action="@{/admin/statistics}"><div class="row g-2 align-items-end"><div class="col-md-4"><label class="form-label">统计月份</label><input class="form-control" type="month" name="yearMonth" th:value="${yearMonth}"></div><div class="col-md-2"><button class="btn btn-primary w-100" type="submit">生成统计</button></div></div></form>
    <div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>月份</th><th>部门</th><th>员工数</th><th>正常次数</th><th>迟到次数</th><th>缺勤次数</th><th>请假天数</th><th>加班小时</th><th>出差天数</th></tr></thead><tbody>
        <tr th:each="r:${rows}"><td th:text="${r.yearMonth}"></td><td th:text="${r.departmentName}"></td><td th:text="${r.employeeCount}"></td><td th:text="${r.normalCount}"></td><td th:text="${r.lateCount}"></td><td th:text="${r.absentCount}"></td><td th:text="${r.leaveDays}"></td><td th:text="${r.overtimeHours}"></td><td th:text="${r.tripDays}"></td></tr>
        <tr th:if="${rows == null or #lists.isEmpty(rows)}"><td colspan="9" class="text-center text-secondary py-4">暂无统计数据</td></tr>
    </tbody></table></div></div>
</main></body></html>
