<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>综合查询</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">返回</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">综合查询</h1><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body mb-3" method="get" th:action="@{/admin/search}">
        <div class="row g-2"><div class="col-md-2"><input class="form-control" name="employeeNo" th:value="${employeeNo}" placeholder="工号精确"></div><div class="col-md-2"><input class="form-control" name="name" th:value="${name}" placeholder="姓名模糊"></div><div class="col-md-2"><select class="form-select" name="departmentId"><option value="">全部部门</option><option th:each="d:${departments}" th:value="${d.id}" th:selected="${departmentId == d.id}" th:text="${d.departmentName}"></option></select></div><div class="col-md-2"><input class="form-control" type="date" name="startDate" th:value="${startDate}"></div><div class="col-md-2"><input class="form-control" type="date" name="endDate" th:value="${endDate}"></div><div class="col-md-2"><button class="btn btn-primary w-100" type="submit">查询</button></div></div>
    </form>
    <section class="mb-4"><h2 class="h5">员工信息</h2><div class="card"><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>工号</th><th>姓名</th><th>部门</th><th>岗位</th><th>状态</th></tr></thead><tbody><tr th:each="e:${employees}"><td th:text="${e.employeeNo}"></td><td th:text="${e.name}"></td><td th:text="${e.departmentName}"></td><td th:text="${e.positionName}"></td><td th:text="${e.status}"></td></tr><tr th:if="${employees == null or #lists.isEmpty(employees)}"><td colspan="5" class="text-center text-secondary">暂无数据</td></tr></tbody></table></div></div></section>
    <section class="mb-4"><h2 class="h5">出勤记录</h2><div class="card"><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>员工</th><th>日期</th><th>状态</th><th>备注</th></tr></thead><tbody><tr th:each="r:${attendanceRecords}"><td th:text="${r.employeeNo + ' ' + r.employeeName}"></td><td th:text="${r.record.attendanceDate}"></td><td th:text="${r.record.status}"></td><td th:text="${r.record.remark}"></td></tr><tr th:if="${attendanceRecords == null or #lists.isEmpty(attendanceRecords)}"><td colspan="4" class="text-center text-secondary">暂无数据</td></tr></tbody></table></div></div></section>
    <section class="mb-4"><h2 class="h5">请假记录</h2><div class="card"><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>员工</th><th>类型</th><th>开始</th><th>结束</th><th>天数</th></tr></thead><tbody><tr th:each="r:${leaveRecords}"><td th:text="${r.employeeNo + ' ' + r.employeeName}"></td><td th:text="${r.record.leaveType}"></td><td th:text="${r.record.startTime}"></td><td th:text="${r.record.endTime}"></td><td th:text="${r.record.days}"></td></tr><tr th:if="${leaveRecords == null or #lists.isEmpty(leaveRecords)}"><td colspan="5" class="text-center text-secondary">暂无数据</td></tr></tbody></table></div></div></section>
    <section class="mb-4"><h2 class="h5">加班记录</h2><div class="card"><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>员工</th><th>日期</th><th>开始</th><th>结束</th><th>小时</th></tr></thead><tbody><tr th:each="r:${overtimeRecords}"><td th:text="${r.employeeNo + ' ' + r.employeeName}"></td><td th:text="${r.record.overtimeDate}"></td><td th:text="${r.record.startTime}"></td><td th:text="${r.record.endTime}"></td><td th:text="${r.record.hours}"></td></tr><tr th:if="${overtimeRecords == null or #lists.isEmpty(overtimeRecords)}"><td colspan="5" class="text-center text-secondary">暂无数据</td></tr></tbody></table></div></div></section>
    <section><h2 class="h5">出差记录</h2><div class="card"><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>员工</th><th>地点</th><th>开始</th><th>结束</th><th>天数</th></tr></thead><tbody><tr th:each="r:${tripRecords}"><td th:text="${r.employeeNo + ' ' + r.employeeName}"></td><td th:text="${r.record.destination}"></td><td th:text="${r.record.startDate}"></td><td th:text="${r.record.endDate}"></td><td th:text="${r.record.days}"></td></tr><tr th:if="${tripRecords == null or #lists.isEmpty(tripRecords)}"><td colspan="5" class="text-center text-secondary">暂无数据</td></tr></tbody></table></div></div></section>
</main></body></html>
