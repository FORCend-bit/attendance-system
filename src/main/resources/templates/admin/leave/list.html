<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>请假管理</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">返回</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">请假管理</h1><div class="alert alert-success" th:if="${message}" th:text="${message}"></div><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body mb-3" th:object="${record}" th:action="@{/admin/leave/save}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="row g-2">
            <div class="col-md-3"><label class="form-label">员工</label><select class="form-select" th:field="*{employeeId}" required><option value="">请选择</option><option th:each="e:${employees}" th:value="${e.id}" th:text="${e.employeeNo + ' - ' + e.name}"></option></select></div>
            <div class="col-md-2"><label class="form-label">类型</label><select class="form-select" th:field="*{leaveType}"><option value="事假">事假</option><option value="病假">病假</option><option value="年假">年假</option><option value="调休">调休</option><option value="其他">其他</option></select></div>
            <div class="col-md-3"><label class="form-label">开始</label><input class="form-control" type="datetime-local" th:field="*{startTime}" required></div>
            <div class="col-md-3"><label class="form-label">结束</label><input class="form-control" type="datetime-local" th:field="*{endTime}" required></div>
            <div class="col-md-1 d-grid align-items-end"><button class="btn btn-success" type="submit">保存</button></div>
            <div class="col-12"><input class="form-control" th:field="*{reason}" placeholder="请假原因"></div>
        </div>
    </form>
    <div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>员工</th><th>部门</th><th>类型</th><th>开始</th><th>结束</th><th>天数</th><th>原因</th><th>操作</th></tr></thead><tbody>
        <tr th:each="row:${records}"><td th:text="${row.employeeNo + ' ' + row.employeeName}"></td><td th:text="${row.departmentName}"></td><td th:text="${row.record.leaveType}"></td><td th:text="${row.record.startTime}"></td><td th:text="${row.record.endTime}"></td><td th:text="${row.record.days}"></td><td th:text="${row.record.reason}"></td><td class="text-nowrap"><a class="btn btn-sm btn-primary" th:href="@{/admin/leave/list(editId=${row.record.id})}">修改</a> <form class="d-inline" th:action="@{/admin/leave/delete}" method="post"><input type="hidden" name="id" th:value="${row.record.id}"><button class="btn btn-sm btn-danger" type="submit">删除</button></form></td></tr>
        <tr th:if="${records == null or #lists.isEmpty(records)}"><td colspan="8" class="text-center text-secondary py-4">暂无数据</td></tr>
    </tbody></table></div></div>
</main></body></html>
