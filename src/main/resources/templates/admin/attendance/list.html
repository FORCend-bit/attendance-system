<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#20986;&#21220;&#31649;&#29702;</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">&#31649;&#29702;&#21592;&#24037;&#20316;&#21488;</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}">&#36820;&#22238;</a></div></nav>
<main class="container page-shell">
    <div class="page-title"><div><h1>&#20986;&#21220;&#31649;&#29702;</h1><p>&#24405;&#20837;&#21592;&#24037;&#25171;&#21345;&#26102;&#38388;&#65292;&#31995;&#32479;&#33258;&#21160;&#21028;&#26029;&#27491;&#24120;&#12289;&#36831;&#21040;&#12289;&#26089;&#36864;&#21644;&#32570;&#21220;</p></div></div>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form class="card card-body mb-3" th:object="${record}" th:action="@{/admin/attendance/save}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label required">&#21592;&#24037;</label><select class="form-select" th:field="*{employeeId}" required><option value="">&#35831;&#36873;&#25321;</option><option th:each="e:${employees}" th:value="${e.id}" th:text="${e.employeeNo + ' - ' + e.name}"></option></select></div>
            <div class="col-md-2"><label class="form-label required">&#26085;&#26399;</label><input class="form-control" type="date" th:field="*{attendanceDate}" required></div>
            <div class="col-md-3"><label class="form-label">&#19978;&#29677;&#26102;&#38388;</label><input class="form-control" type="datetime-local" th:field="*{checkInTime}"></div>
            <div class="col-md-3"><label class="form-label">&#19979;&#29677;&#26102;&#38388;</label><input class="form-control" type="datetime-local" th:field="*{checkOutTime}"></div>
            <div class="col-md-1 d-grid align-items-end"><button class="btn btn-success" type="submit">&#20445;&#23384;</button></div>
            <div class="col-12"><label class="form-label">&#22791;&#27880;</label><input class="form-control" th:field="*{remark}" placeholder="&#21487;&#22635;&#20889;&#24322;&#24120;&#35828;&#26126;"></div>
        </div>
    </form>

    <div class="card mb-3"><div class="card-body"><form class="row g-2" method="get" th:action="@{/admin/attendance/list}"><div class="col-md-3"><input class="form-control" name="employeeNo" th:value="${employeeNo}" placeholder="&#24037;&#21495;"></div><div class="col-md-3"><input class="form-control" name="name" th:value="${name}" placeholder="&#22995;&#21517;"></div><div class="col-md-2"><input class="form-control" type="date" name="startDate" th:value="${startDate}"></div><div class="col-md-2"><input class="form-control" type="date" name="endDate" th:value="${endDate}"></div><div class="col-md-2"><button class="btn btn-outline-primary w-100" type="submit">&#26597;&#35810;</button></div></form></div></div>

    <div class="card"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>&#21592;&#24037;</th><th>&#37096;&#38376;</th><th>&#26085;&#26399;</th><th>&#19978;&#29677;</th><th>&#19979;&#29677;</th><th>&#29366;&#24577;</th><th>&#22791;&#27880;</th><th>&#25805;&#20316;</th></tr></thead><tbody>
        <tr th:each="row:${records}"><td th:text="${row.employeeNo + ' ' + row.employeeName}"></td><td th:text="${row.departmentName}"></td><td th:text="${row.record.attendanceDate}"></td><td th:text="${row.record.checkInTime}"></td><td th:text="${row.record.checkOutTime}"></td><td><span class="badge" th:classappend="${#strings.equals(row.record.status, '&#27491;&#24120;')} ? ' text-bg-success' : (${#strings.equals(row.record.status, '&#36831;&#21040;')} ? ' text-bg-warning' : (${#strings.equals(row.record.status, '&#32570;&#21220;')} ? ' text-bg-danger' : ' text-bg-secondary'))" th:text="${row.record.status}"></span></td><td th:text="${row.record.remark}"></td><td class="text-nowrap"><a class="btn btn-sm btn-primary" th:href="@{/admin/attendance/list(editId=${row.record.id})}">&#20462;&#25913;</a> <form class="d-inline" th:action="@{/admin/attendance/delete}" method="post"><input type="hidden" name="id" th:value="${row.record.id}"><button class="btn btn-sm btn-danger" type="submit">&#21024;&#38500;</button></form></td></tr>
        <tr th:if="${records == null or #lists.isEmpty(records)}"><td colspan="8" class="text-center empty-state">&#26242;&#26080;&#25968;&#25454;</td></tr>
    </tbody></table></div></div>
</main>
<footer class="app-footer">&#169; 2026 &#21592;&#24037;&#32771;&#21220;&#20449;&#24687;&#31649;&#29702;&#31995;&#32479;</footer>
</body></html>
