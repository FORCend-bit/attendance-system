<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>员工详情</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/admin}">管理员端</a><a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/employee/list}">返回员工列表</a></div></nav>
<main class="container py-4"><h1 class="h3 mb-3">员工详情</h1><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="card" th:if="${employee != null}"><div class="card-body"><div class="row g-3">
        <div class="col-md-3"><strong>工号：</strong><span th:text="${employee.employeeNo}"></span></div><div class="col-md-3"><strong>姓名：</strong><span th:text="${employee.name}"></span></div><div class="col-md-3"><strong>部门：</strong><span th:text="${employee.departmentName}"></span></div><div class="col-md-3"><strong>岗位：</strong><span th:text="${employee.positionName}"></span></div>
        <div class="col-md-3"><strong>职务：</strong><span th:text="${employee.titleName}"></span></div><div class="col-md-3"><strong>状态：</strong><span th:text="${employee.status}"></span></div><div class="col-md-3"><strong>入职：</strong><span th:text="${employee.hireDate}"></span></div><div class="col-md-3"><strong>离职：</strong><span th:text="${employee.resignDate}"></span></div>
        <div class="col-md-3"><strong>电话：</strong><span th:text="${employee.phone}"></span></div><div class="col-md-3"><strong>邮箱：</strong><span th:text="${employee.email}"></span></div><div class="col-md-3"><strong>基本工资：</strong><span th:text="${employee.baseSalary}"></span></div><div class="col-md-3"><strong>补贴：</strong><span th:text="${employee.allowance}"></span></div>
        <div class="col-12"><strong>地址：</strong><span th:text="${employee.address}"></span></div>
    </div></div></div>
</main></body></html>
