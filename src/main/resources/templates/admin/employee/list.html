<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#21592;&#24037;&#31649;&#29702;</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">&#31649;&#29702;&#21592;&#31471;</a>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">&#39318;&#39029;</a>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">&#21592;&#24037;&#31649;&#29702;</h1>
        <a class="btn btn-success" th:href="@{/admin/employee/add}">&#26032;&#22686;&#21592;&#24037;</a>
    </div>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form class="card card-body mb-3" method="get" th:action="@{/admin/employee/list}">
        <div class="row g-2">
            <div class="col-md-3"><input class="form-control" name="employeeNo" th:value="${employeeNo}" placeholder="&#24037;&#21495;&#31934;&#30830;&#26597;&#35810;"></div>
            <div class="col-md-3"><input class="form-control" name="name" th:value="${name}" placeholder="&#22995;&#21517;&#27169;&#31946;&#26597;&#35810;"></div>
            <div class="col-md-3">
                <select class="form-select" name="departmentId">
                    <option value="">&#20840;&#37096;&#37096;&#38376;</option>
                    <option th:each="d:${departments}" th:value="${d.id}" th:selected="${departmentId == d.id}" th:text="${d.departmentName}"></option>
                </select>
            </div>
            <div class="col-md-3"><button class="btn btn-outline-primary w-100" type="submit">&#26597;&#35810;</button></div>
        </div>
    </form>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>&#24037;&#21495;</th>
                    <th>&#22995;&#21517;</th>
                    <th>&#37096;&#38376;</th>
                    <th>&#23703;&#20301;</th>
                    <th>&#32844;&#21153;</th>
                    <th>&#34218;&#36164;</th>
                    <th>&#29366;&#24577;</th>
                    <th>&#25805;&#20316;</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e:${employees}">
                    <td th:text="${e.employeeNo}"></td>
                    <td th:text="${e.name}"></td>
                    <td th:text="${e.departmentName}"></td>
                    <td th:text="${e.positionName}"></td>
                    <td th:text="${e.titleName}"></td>
                    <td th:text="${e.baseSalary}"></td>
                    <td>
                        <span class="badge" th:classappend="${#strings.equals(e.status, '&#22312;&#32844;')} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${e.status}"></span>
                    </td>
                    <td class="text-nowrap">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/employee/detail(id=${e.id})}">&#35814;&#24773;</a>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/employee/edit(id=${e.id})}">&#20462;&#25913;</a>
                        <form class="d-inline" th:action="@{/admin/employee/resign}" method="post">
                            <input type="hidden" name="id" th:value="${e.id}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">&#27880;&#38144;</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${employees == null or #lists.isEmpty(employees)}">
                    <td colspan="8" class="text-center text-secondary py-4">&#26242;&#26080;&#25968;&#25454;</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="text-secondary mt-3">&#20849; <span th:text="${total}">0</span> &#26465;&#65292;&#24403;&#21069;&#31532; <span th:text="${page}">1</span> / <span th:text="${pages}">1</span> &#39029;</div>
</main>
</body>
</html>
