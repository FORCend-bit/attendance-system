<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>月度统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/site.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white"><div class="container"><a class="navbar-brand fw-bold" href="admin-home.html">管理员端</a><a class="btn btn-outline-secondary btn-sm" href="admin-home.html">返回</a></div></nav>
<main class="container py-4">
    <h1 class="h3 mb-3">月度分部门考勤统计</h1>
    <div class="card mb-3"><div class="card-body"><div class="row g-2 align-items-end"><div class="col-md-4"><label class="form-label">统计月份</label><input class="form-control" type="month" value="2026-07"></div><div class="col-md-2"><button class="btn btn-primary w-100" onclick="searchNotice()">生成统计</button></div></div></div></div>
    <div class="card mb-4"><div class="table-responsive"><table class="table table-hover mb-0">
        <thead><tr><th>部门</th><th>正常</th><th>迟到</th><th>早退</th><th>缺勤</th><th>请假天数</th><th>加班小时</th><th>出差天数</th></tr></thead>
        <tbody>
        <tr><td>技术部</td><td>18</td><td>2</td><td>1</td><td>0</td><td>1.00</td><td>9.00</td><td>5.00</td></tr>
        <tr><td>人事部</td><td>16</td><td>1</td><td>0</td><td>1</td><td>0.38</td><td>2.00</td><td>0.00</td></tr>
        <tr><td>财务部</td><td>15</td><td>0</td><td>1</td><td>2</td><td>0.00</td><td>0.00</td><td>2.00</td></tr>
        </tbody>
    </table></div></div>
    <div class="card"><div class="card-body">
        <h2 class="h5 mb-3">统计图预览</h2>
        <div class="mb-3"><div class="d-flex justify-content-between"><span>技术部正常出勤</span><span>18次</span></div><div class="progress stat-bar"><div class="progress-bar bg-success" style="width: 90%"></div></div></div>
        <div class="mb-3"><div class="d-flex justify-content-between"><span>人事部正常出勤</span><span>16次</span></div><div class="progress stat-bar"><div class="progress-bar bg-primary" style="width: 80%"></div></div></div>
        <div><div class="d-flex justify-content-between"><span>财务部正常出勤</span><span>15次</span></div><div class="progress stat-bar"><div class="progress-bar bg-info" style="width: 75%"></div></div></div>
    </div></div>
</main>
<footer class="page-footer">本页面为课程设计静态演示版，完整业务功能由 Spring Boot + MySQL 后端实现。</footer>
<script src="assets/demo.js"></script>
</body>
</html>
