<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人信息</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/site.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white">
    <div class="container">
        <a class="navbar-brand fw-bold" href="employee-home.html">员工端</a>
        <a class="btn btn-outline-secondary btn-sm" href="employee-home.html">返回员工首页</a>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-3">个人信息</h1>
    <div class="card">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">姓名</label><input class="form-control" value="张三" readonly></div>
                <div class="col-md-4"><label class="form-label">工号</label><input class="form-control" value="E2026001" readonly></div>
                <div class="col-md-4"><label class="form-label">部门</label><input class="form-control" value="技术部" readonly></div>
                <div class="col-md-4"><label class="form-label">岗位</label><input class="form-control" value="Java开发工程师" readonly></div>
                <div class="col-md-4"><label class="form-label">职务</label><input class="form-control" value="员工" readonly></div>
                <div class="col-md-4"><label class="form-label">薪资</label><input class="form-control" value="8500.00" readonly></div>
                <div class="col-md-4"><label class="form-label">电话</label><input class="form-control" value="13800000001"></div>
                <div class="col-md-4"><label class="form-label">邮箱</label><input class="form-control" value="zhangsan@example.com"></div>
                <div class="col-md-4"><label class="form-label">地址</label><input class="form-control" value="西安市雁塔区"></div>
            </div>
            <button class="btn btn-success mt-4" onclick="demoNotice()">保存</button>
        </div>
    </div>
</main>
<footer class="page-footer">本页面为课程设计静态演示版，完整业务功能由 Spring Boot + MySQL 后端实现。</footer>
<script src="assets/demo.js"></script>
</body>
</html>
